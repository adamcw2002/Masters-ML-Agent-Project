behaviors:
  OvercookedAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.3
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
#      gail:
#        strength: 0.6
#        demo_path: Demos/AgentStatic.demo
#    behavioral_cloning:
#        strength: 0.6
#        demo_path: Demos/AgentStatic.demo
    keep_checkpoints: 5
    max_steps: 10000000
    time_horizon: 256
    summary_freq: 25000
