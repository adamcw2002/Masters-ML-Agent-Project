behaviors:
  OvercookedAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.15
      lambd: 0.95
      num_epoch: 5
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
#      gail:
#        strength: 0.5
#        demo_path: Assets/Demos/AgentStatic.demo
    keep_checkpoints: 5
    max_steps: 120000000
    time_horizon: 512
    summary_freq: 25000
